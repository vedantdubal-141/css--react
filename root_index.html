<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Projects Sandbox</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f9fafb; }
        h1 { font-size: 2rem; margin-bottom: 2rem; color: #111827; }
        .grid { display: flex; gap: 2rem; }
        .card { padding: 2rem; border-radius: 8px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-decoration: none; color: #374151; font-weight: bold; width: 200px; text-align: center; border: 2px solid transparent; transition: all 0.2s; }
        .card:hover { border-color: #3b82f6; transform: translateY(-3px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h1>React Projects Dashboard</h1>
    <div class="grid">
        <a href="/css--react/hm/" class="card">H&M Clone</a>
        <a href="/css--react/centralhostel/" class="card">Central Hostel</a>
        <a href="/css--react/loopring/" class="card">Loopring App</a>
    </div>
</body>
</html>
